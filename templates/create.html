{% extends 'base.html' %}
{% block title %}Agendar Cita{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">

    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-header bg-success text-white rounded-top-4 py-3">
        <h4 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-2"></i>Agendar nueva cita</h4>
      </div>

      <div class="card-body p-4">
        <form action="/save" method="POST">

          <div class="mb-3">
            <label for="mascota" class="form-label fw-semibold">
              <i class="bi bi-emoji-smile me-1 text-success"></i>Nombre de la mascota
            </label>
            <input type="text" class="form-control form-control-lg" name="mascota" id="mascota"
                   placeholder="Ej: Max, Luna, Toby..." required>
          </div>

          <div class="mb-3">
            <label for="propietario" class="form-label fw-semibold">
              <i class="bi bi-person me-1 text-success"></i>Propietario
            </label>
            <input type="text" class="form-control form-control-lg" name="propietario" id="propietario"
                   placeholder="Nombre completo del propietario" required>
          </div>

          <div class="mb-3">
            <label for="especie" class="form-label fw-semibold">
              <i class="bi bi-grid me-1 text-success"></i>Especie
            </label>
            <select class="form-select form-select-lg" name="especie" id="especie" required>
              <option value="" disabled selected>Seleccione una especie...</option>
              <option value="Perro"> Perro</option>
              <option value="Gato"> Gato</option>
              <option value="Ave"> Ave</option>
              <option value="Conejo"> Conejo</option>
              <option value="Hamster"> Hamster</option>
              <option value="Otro"> Otro</option>
            </select>
          </div>

          <div class="mb-4">
            <label for="fecha" class="form-label fw-semibold">
              <i class="bi bi-calendar-event me-1 text-success"></i>Fecha de la cita
            </label>
            <input type="date" class="form-control form-control-lg" name="fecha" id="fecha" required>
          </div>

          <div class="d-flex gap-2">
            <a href="/" class="btn btn-secondary btn-lg flex-fill">
              <i class="bi bi-arrow-left me-1"></i>Cancelar
            </a>
            <button type="submit" class="btn btn-success btn-lg flex-fill">
              <i class="bi bi-check-circle me-1"></i>Guardar cita
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>

{% endblock %}
