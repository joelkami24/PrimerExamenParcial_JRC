{% extends 'base.html' %}
{% block title %}Modificar Cita{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">

    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-header bg-warning text-dark rounded-top-4 py-3">
        <h4 class="mb-0 fw-bold"><i class="bi bi-pencil-fill me-2"></i>Modificar cita — {{ paciente.mascota }}</h4>
      </div>

      <div class="card-body p-4">
        <form action="/update" method="POST">
          <!-- Campo oculto con el ID -->
          <input type="hidden" name="id" value="{{ paciente.id }}">

          <div class="mb-3">
            <label for="mascota" class="form-label fw-semibold">
              <i class="bi bi-emoji-smile me-1 text-warning"></i>Nombre de la mascota
            </label>
            <input type="text" class="form-control form-control-lg" name="mascota" id="mascota"
                   value="{{ paciente.mascota }}" required>
          </div>

          <div class="mb-3">
            <label for="propietario" class="form-label fw-semibold">
              <i class="bi bi-person me-1 text-warning"></i>Propietario
            </label>
            <input type="text" class="form-control form-control-lg" name="propietario" id="propietario"
                   value="{{ paciente.propietario }}" required>
          </div>

          <div class="mb-3">
            <label for="especie" class="form-label fw-semibold">
              <i class="bi bi-grid me-1 text-warning"></i>Especie
            </label>
            <select class="form-select form-select-lg" name="especie" id="especie" required>
              <option value="Perro" {{ 'selected' if paciente.especie == 'Perro' }}> Perro</option>
              <option value="Gato" {{ 'selected' if paciente.especie == 'Gato' }}> Gato</option>
              <option value="Ave" {{ 'selected' if paciente.especie == 'Ave' }}> Ave</option>
              <option value="Conejo" {{ 'selected' if paciente.especie == 'Conejo' }}>Conejo</option>
              <option value="Hamster" {{ 'selected' if paciente.especie == 'Hamster' }}> Hamster</option>
              <option value="Otro" {{ 'selected' if paciente.especie == 'Otro' }}> Otro</option>
            </select>
          </div>

          <div class="mb-4">
            <label for="fecha" class="form-label fw-semibold">
              <i class="bi bi-calendar-event me-1 text-warning"></i>Fecha de la cita
            </label>
            <input type="date" class="form-control form-control-lg" name="fecha" id="fecha"
                   value="{{ paciente.fecha }}" required>
          </div>

          <div class="d-flex gap-2">
            <a href="/" class="btn btn-secondary btn-lg flex-fill">
              <i class="bi bi-arrow-left me-1"></i>Volver
            </a>
            <button type="submit" class="btn btn-warning btn-lg flex-fill text-dark fw-bold">
              <i class="bi bi-check-circle me-1"></i>Actualizar cita
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>

{% endblock %}
