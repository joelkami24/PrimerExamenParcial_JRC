<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Clínica Veterinaria{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
      body {
        background-color: #f0f4f8;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .navbar-brand i {
        font-size: 1.4rem;
      }
      .card-cita {
        border: none;
        border-radius: 16px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .card-cita:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.13);
      }
      .badge-especie {
        font-size: 0.8rem;
        border-radius: 20px;
        padding: 5px 12px;
      }
      .icon-mascota {
        font-size: 2.8rem;
        line-height: 1;
      }
      main {
        flex: 1;
      }
      footer {
        background-color: #1a1a2e;
        color: #aaa;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
          <i class="bi bi-heart-pulse-fill text-danger"></i>
          Clínica Veterinaria
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/"><i class="bi bi-calendar2-week me-1"></i>Agenda</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/create"><i class="bi bi-plus-circle me-1"></i>Agendar cita</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container py-4">
      {% block content %}
      {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="py-3 text-center">
      <p class="mb-0">&copy; 2026 Clínica Veterinaria &mdash; Sistema de Gestión de Citas</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
